<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload JavaScript with Progress Ba | CodingNepal</title>
  <link rel="stylesheet" href="upload-page.component.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
</head>
<body>
  <app-side-nav-bar></app-side-nav-bar>
  <section class="home-section">
        
  <div class="wrapper">
    <header>Select File to Upload</header>
    
    <form #form (click)="openFilePicker()">
      <input #inputFileTag class="file-input" type="file" name="file" hidden>
      <i class="fas fa-cloud-upload-alt"></i>
      <p>Browse File to Upload</p>
    </form>
    <section class="progress-area">
      <!-- <li class="row">
        <i class="fas fa-file-alt"></i>
        <div class="content">
          <div class="details">
            <span class="name">FileName.pdf • Uploading</span>
            <span class="percent">20%</span>
          </div>
          <div class="progress-bar">
            <div class="progress" style="width: 20%"></div>
          </div>
        </div>
      </li>
      <li class="row">
        <div class="content upload">
          <i class="fas fa-file-alt"></i>
          <div class="details">
            <span class="name">Filename • Uploaded</span>
            <span class="size">324.kb</span>
          </div>
        </div>
        <i class="fas fa-check"></i>
      </li> -->
      <div *ngIf="fileSelectedForUpload" class="progress mt-2">
        <div
          class="progress-bar progress-bar-info"
          role="progressbar"
          attr.aria-valuenow="{{ percentage }}"
          aria-valuemin="0"
          aria-valuemax="100"
          [ngStyle]="{ width: percentage + '%' }"
        >
          {{ percentage }}%
        </div>
      </div>
      <input id="fileUploadInput" type="file" class="text-nowrap text-truncate" (change)="selectFile($event)"/>
      <button (click)="upload()">Upload</button>

    </section>
    <section class="uploaded-area"></section>
  </div>

 
</section>
</body>
</html>
