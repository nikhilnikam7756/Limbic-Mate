<!doctype html>
<html lang="en">
  <head>
  	<title>Table 09</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,700' rel='stylesheet' type='text/css'>

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	

	</head>
	<body>
        
			<div class="row">
				<div class="col-md-12">
					<!-- <input class="form-control" type="text" placeholder="Search" [(ngModel)]="searchText"> -->
					&nbsp;
					<div  [hidden]="false" class="table-wrap" >
						<table class="table table-striped">
						  <thead class="thead-light">
						    <tr>
							  <th>Id</th>
						      <th>File Name</th>
						      <th>Last Modified</th>
                              <th>File Size</th>
						      <th>Download</th>
                              <th>Delete</th>
						    </tr>
						  </thead>
						  <tbody>
						    <!-- <tr  *ngFor="let en of enquiryList | search:searchText"> 
						      <th scope="row" ><a href="javascript:void(0);" (click)="navigateToViewPage(en.admissionId)">{{en.admissionId}}</a></th>
						      <td>{{en.firstName}}</td>
						      <td>{{en.middleName}}</td>
							  <td>{{en.lastName}}</td>
							  <td>{{en.adharCardNo}}</td>
							  <td>{{en.admission}}</td>
							  <td>{{en.branch}}</td>
							  <td>{{en.contactNo}}</td>
						    </tr>                               -->
                            <tr *ngFor="let fileEntry of filesList;let i = index"> 
                                <th >{{i+1}}</th>
                                <td>{{fileEntry.fileName}}</td>
                                <td>{{fileEntry.lastModified}}</td>
                                <td>{{formatSizeUnits(stringToNumber(fileEntry.fileSize))}}</td>
                                <td><a 	>Download</a></td>
                                <td><a href="#">Delete</a></td>
                              </tr>

                        </tbody>
						</table>
					</div>
				</div>
			</div>

	</body>
</html>
